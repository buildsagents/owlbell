# fly.toml app configuration file generated for owlbell-api on 2026-06-24T13:01:47+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'owlbell-api'
primary_region = 'iad'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  APP_DEBUG = 'false'
  APP_ENV = 'production'
  LOG_LEVEL = 'INFO'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
