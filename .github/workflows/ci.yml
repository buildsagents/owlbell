# ============================================================
# Owlbell — CI Pipeline (Pull Request Validation)
# ============================================================
# Triggers: pull_request (opened, synchronize, reopened)
# Jobs:
#   1. Lint — ruff, mypy, eslint
#   2. Test — unit tests with coverage
#   3. Build — Docker image build (no push)
#   4. Security — Trivy vulnerability scan
# ============================================================

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infrastructure/**'
      - '.github/workflows/**'
      - 'pyproject.toml'
      - 'package*.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: answerflowai

jobs:

  # ============================================================
  # Job 1: Lint
  # ============================================================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Python linting ----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install ruff mypy black isort bandit[toml]

      - name: Run Ruff (fast Python linter)
        run: |
          cd backend
          ruff check app tests --output-format=github
          ruff format --check app tests

      - name: Run mypy (type checker)
        run: |
          cd backend
          mypy app --ignore-missing-imports --strict --show-error-codes 2>/dev/null || true

      - name: Run isort (import sorter)
        run: |
          cd backend
          isort app tests --check-only --diff

      - name: Run Bandit (security linter)
        run: |
          cd backend
          bandit -r app -f json -o bandit-report.json || true
          bandit -r app -ll || true

      # ---- JavaScript/TypeScript linting ----
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Run TypeScript check
        run: |
          cd frontend
          npm run typecheck 2>/dev/null || npx tsc --noEmit || true

      - name: Run Prettier check
        run: |
          cd frontend
          npm run format:check 2>/dev/null || npx prettier --check src/ || true

      # ---- Dockerfile linting ----
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "infrastructure/docker/Dockerfile.*"
          recursive: true
          failure-threshold: warning

  # ============================================================
  # Job 2: Unit Tests
  # ============================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: answerflow_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -x
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/answerflow_test
          REDIS_URL: redis://localhost:6379/0
          APP_SECRET_KEY: test-secret-key-not-for-production
          APP_ENV: test
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET_NAME: answerflow-test
          MINIO_USE_SSL: false
          CELERY_BROKER_URL: redis://localhost:6379/2
          CELERY_RESULT_BACKEND: redis://localhost:6379/3
          JWT_SECRET_KEY: test-jwt-secret-key

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # Frontend tests
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test:ci 2>/dev/null || npm run test -- --watchAll=false --ci --coverage || true

  # ============================================================
  # Job 3: Build Docker Images
  # ============================================================
  build:
    name: Build Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, test]

    strategy:
      matrix:
        service: [api, dashboard, freeswitch, whisper, ollama, piper]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./infrastructure/docker/Dockerfile.${{ matrix.service }}
          platforms: linux/arm64
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 4: Security Scan
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Secret scanning ----
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      # ---- Dependency vulnerability scan ----
      - name: Run Trivy vulnerability scanner (repo)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-repo-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-repo-results.sarif'

      # ---- Build and scan images ----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./infrastructure/docker/Dockerfile.api
          push: false
          load: true
          tags: scan-target:api

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scan-target:api'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
