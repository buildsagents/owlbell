# ============================================================
# Owlbell — CD Pipeline (Production Deployment)
# ============================================================
# Triggers: push to main branch, version tags
# Jobs:
#   1. Build — Multi-arch Docker images (AMD64 + ARM64)
#   2. Push — Push to GitHub Container Registry (free)
#   3. Deploy — Deploy to Oracle Cloud via SSH
#   4. Notify — Slack notification
# ============================================================

name: CD / Production Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: answerflowai
  PYTHON_VERSION: '3.11'

jobs:

  # ============================================================
  # Job 1: Build & Push Multi-Arch Images
  # ============================================================
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service: [api, dashboard, freeswitch, whisper, ollama, piper]
        include:
          - service: api
            dockerfile: Dockerfile.api
            context: ./
          - service: dashboard
            dockerfile: Dockerfile.dashboard
            context: ./
          - service: freeswitch
            dockerfile: Dockerfile.freeswitch
            context: ./
          - service: whisper
            dockerfile: Dockerfile.whisper
            context: ./
          - service: ollama
            dockerfile: Dockerfile.whisper
            context: ./
          - service: piper
            dockerfile: Dockerfile.piper
            context: ./

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ./infrastructure/docker/${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

  # ============================================================
  # Job 2: Deploy to Production Server
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via SSH
        run: |
          set -e
          ssh -o StrictHostKeyChecking=accept-new \
              -p ${{ secrets.SSH_PORT || 22 }} \
              ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'REMOTE_EOF'
            set -euo pipefail
            
            echo "=== Owlbell Deployment ==="
            echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Git SHA:  ${{ github.sha }}"
            echo "Branch:   ${{ github.ref_name }}"
            echo "Actor:    ${{ github.actor }}"
            
            cd /opt/answerflow
            
            # Pull latest code
            echo "[1/6] Pulling latest code..."
            git fetch origin
            git reset --hard origin/main
            
            # Export deployment variables
            export GIT_SHA="${{ github.sha }}"
            export DOMAIN="${{ secrets.DOMAIN }}"
            
            # Pull latest images
            echo "[2/6] Pulling latest Docker images..."
            docker compose -f infrastructure/docker/docker-compose.yml pull
            
            # Run database migrations
            echo "[3/6] Running database migrations..."
            docker compose -f infrastructure/docker/docker-compose.yml run --rm api \
              alembic upgrade head
            
            # Rolling restart (zero-downtime via blue-green)
            echo "[4/6] Restarting services..."
            docker compose -f infrastructure/docker/docker-compose.yml up -d --remove-orphans
            
            # Cleanup old images
            echo "[5/6] Cleaning up..."
            docker system prune -af --volumes=false
            docker volume prune -f
            
            # Health check
            echo "[6/6] Running health checks..."
            sleep 15
            
            HEALTHY=true
            
            # Check API
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "  ✓ API healthy"
            else
              echo "  ✗ API unhealthy!"
              HEALTHY=false
            fi
            
            # Check WebSocket
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "  ✓ WebSocket healthy"
            else
              echo "  ✗ WebSocket unhealthy!"
              HEALTHY=false
            fi
            
            # Check Redis
            if docker exec af_redis redis-cli ping | grep -q PONG; then
              echo "  ✓ Redis healthy"
            else
              echo "  ✗ Redis unhealthy!"
              HEALTHY=false
            fi
            
            # Check PostgreSQL
            if docker exec af_postgres pg_isready -U $POSTGRES_USER > /dev/null 2>&1; then
              echo "  ✓ PostgreSQL healthy"
            else
              echo "  ✗ PostgreSQL unhealthy!"
              HEALTHY=false
            fi
            
            if [ "$HEALTHY" = false ]; then
              echo ""
              echo "⚠️  Some health checks failed! Check logs:"
              echo "  docker compose -f infrastructure/docker/docker-compose.yml logs --tail=100"
              exit 1
            fi
            
            echo ""
            echo "=== Deployment successful! ==="
            echo "API:      https://${{ secrets.DOMAIN }}/api/health"
            echo "Dashboard: https://app.${{ secrets.DOMAIN }}"
            echo "Grafana:  https://monitoring.${{ secrets.DOMAIN }}"
          REMOTE_EOF
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}

      - name: Verify deployment
        run: |
          echo "Waiting for services to stabilize..."
          sleep 10
          curl -sf https://${{ secrets.DOMAIN }}/health || echo "Health check via domain may need DNS propagation"

  # ============================================================
  # Job 3: Notify
  # ============================================================
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy
    if: always()

    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            *Owlbell Deployment*
            Status: ${{ needs.deploy.result == 'success' && ':white_check_mark: SUCCESS' || ':x: FAILED' }}
            Commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
            By: ${{ github.actor }}
            ${{ needs.deploy.result != 'success' && '<!here> Deployment failed! Check logs immediately.' || '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always() && secrets.SLACK_WEBHOOK_URL != ''
