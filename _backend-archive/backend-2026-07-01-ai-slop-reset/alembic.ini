# Owlbell — Alembic Migration Configuration
# ================================================
# Documentation: https://alembic.sqlalchemy.org/en/latest/tutorial.html
#
# Usage:
#   alembic revision --autogenerate -m "Add user table"
#   alembic upgrade head
#   alembic downgrade -1
#   alembic history
#   alembic current

[alembic]
# Path to migration scripts
script_location = backend/db/migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = backend

# Truncate length of slug field in filename
truncate_slug_length = 40

# -- SQLAlchemy Configuration ------------------------------------------------

# The database URL is set via env.py from environment variables.
# This placeholder is overridden at runtime.
sqlalchemy.url = driver://user:pass@localhost/dbname

# Use asyncpg driver for async operations
# Full URL built in env.py: postgresql+asyncpg://user:pass@host:port/db

# -- Logging -----------------------------------------------------------------

# Log file path (empty = stdout)
# Override with ALEMBIC_LOG_FILE env var
# file_config_log = 

[post_write_hooks]
# Format generated migration files with black
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 100

# -- Logging Configuration ---------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
