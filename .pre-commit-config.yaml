# =============================================================================
# Owlbell — Pre-commit Configuration
# =============================================================================
# Install:   pre-commit install
# Run all:   pre-commit run --all-files
# Update:    pre-commit autoupdate
# =============================================================================

default_stages: [pre-commit]

# Fail fast so developer gets immediate feedback
fail_fast: true

# Set default language versions
default_language_version:
  python: python3.11

repos:
  # ---------------------------------------------------------------------------
  # General file checks
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Trailing whitespace is evil
      - id: trailing-whitespace
        name: "Trim trailing whitespace"
        exclude: "^.snapshots/|^.vscode/|^.idea/"

      # Ensure files end with a newline
      - id: end-of-file-fixer
        name: "Fix end of files"
        exclude: "^.snapshots/|^.vscode/|^.idea/"

      # Check YAML syntax
      - id: check-yaml
        name: "Check YAML syntax"
        exclude: "^infrastructure/helm/"

      # Check JSON syntax
      - id: check-json
        name: "Check JSON syntax"
        files: "\.(json)$"
        exclude: "^.vscode/|tsconfig.json"

      # Check TOML syntax
      - id: check-toml
        name: "Check TOML syntax"
        files: "\.(toml)$"

      # Prevent committing to main/master directly
      - id: no-commit-to-branch
        name: "Prevent commit to main"
        args: ["--branch", "main", "--branch", "master"]

      # Check for merge conflict markers
      - id: check-merge-conflict
        name: "Check for merge conflicts"

      # Check for case-insensitive filename collisions
      - id: check-case-conflict
        name: "Check case conflicts"

      # Check for files that would trip up Windows
      - id: check-symlinks
        name: "Check symlinks"

      # Don't allow adding large files
      - id: check-added-large-files
        name: "Check large files"
        args: ["--maxkb=1000"]

      # Check for broken executable shebangs
      - id: check-executables-have-shebangs
        name: "Check executable shebangs"

      # Check for invalid Python file encoding
      - id: fix-byte-order-marker
        name: "Fix BOM markers"

      # Check Python AST for syntax errors
      - id: check-ast
        name: "Check Python AST"
        files: "\.py$"

      # Check for private keys
      - id: detect-private-key
        name: "Detect private keys"

      # Check for debug statements
      - id: debug-statements
        name: "Check debug statements"
        files: "\.py$"

  # ---------------------------------------------------------------------------
  # Python formatting — Black
  # ---------------------------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        name: "Black formatter"
        language_version: python3.11
        files: "^backend/.*\.py$"
        args: ["--line-length=100", "--target-version=py311"]

  # ---------------------------------------------------------------------------
  # Python linting + import sorting — Ruff
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.1
    hooks:
      # Ruff linter
      - id: ruff
        name: "Ruff linter"
        files: "^backend/.*\.py$"
        args:
          - --fix
          - --exit-non-zero-on-fix
          - --line-length=100
          - --select=E,W,F,I,N,D,UP,B,C4,SIM,ARG

      # Ruff formatter (faster alternative to Black)
      - id: ruff-format
        name: "Ruff formatter"
        files: "^backend/.*\.py$"
        args: ["--line-length=100"]

  # ---------------------------------------------------------------------------
  # Python type checking — mypy
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: "mypy type checker"
        files: "^backend/.*\.py$"
        additional_dependencies:
          - pydantic>=2.0
          - pydantic-settings>=2.0
          - sqlalchemy>=2.0
          - types-python-dateutil
          - types-requests
          - types-redis
          - types-passlib
        args:
          - --ignore-missing-imports
          - --show-error-codes
          - --pretty
          - --python-version=3.11

  # ---------------------------------------------------------------------------
  # Python imports — isort (complement to Ruff's import sorting)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: "isort import sorter"
        files: "^backend/.*\.py$"
        args:
          - --profile=black
          - --line-length=100
          - --force-single-line
          - --order-by-type

  # ---------------------------------------------------------------------------
  # Frontend — ESLint (dashboard)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: eslint-dashboard
        name: "ESLint (dashboard)"
        entry: bash -c 'cd dashboard && npm run lint -- --max-warnings=0'
        language: system
        files: "^dashboard/.*\.(ts|tsx|js|jsx)$"
        pass_filenames: false
        stages: [pre-commit]

  # ---------------------------------------------------------------------------
  # Frontend — TypeScript type check
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: tsc-dashboard
        name: "TypeScript check (dashboard)"
        entry: bash -c 'cd dashboard && npx tsc --noEmit'
        language: system
        files: "^dashboard/.*\.(ts|tsx)$"
        pass_filenames: false
        stages: [pre-commit]

  # ---------------------------------------------------------------------------
  # Commit message validation
  # ---------------------------------------------------------------------------
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        name: "Commitizen commit message"
        stages: [commit-msg]

  # ---------------------------------------------------------------------------
  # Security scanning — Bandit
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        name: "Bandit security scan"
        files: "^backend/.*\.py$"
        args:
          - -iii
          - -ll
          - --exclude=backend/tests/

  # ---------------------------------------------------------------------------
  # Spell checking
  # ---------------------------------------------------------------------------
  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
      - id: codespell
        name: "Codespell typo checker"
        files: "^.*\.(py|md|rst|ts|tsx|js|jsx|json|yaml|yml|toml)$"
        args: ["--skip=package-lock.json,yarn.lock,node_modules,.*,*.lock"]
