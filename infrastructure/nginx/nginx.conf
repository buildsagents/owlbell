# ============================================================
# Owlbell — Nginx Main Configuration
# ============================================================
# File: infrastructure/nginx/nginx.conf
# Version: 1.0
# Purpose: Reverse proxy, SSL termination, rate limiting
# Architecture: Single entry point → multi-service routing
# ============================================================

# Run as nginx user (non-root)
user nginx;

# Auto-detect CPU cores for worker processes
worker_processes auto;

# Error log level
error_log /var/log/nginx/error.log warn;

# PID file
pid /var/run/nginx.pid;

# Load dynamic modules
load_module modules/ngx_http_js_module.so;

# ============================================================
# Events Module
# ============================================================
events {
    # Maximum connections per worker
    worker_connections 4096;

    # Use epoll for high-performance event handling (Linux)
    use epoll;

    # Accept multiple connections per worker cycle
    multi_accept on;
}

# ============================================================
# HTTP Module
# ============================================================
http {
    # --------------------------------------------------------
    # Basic Settings
    # --------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Custom log format with upstream timing
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'req_id="$request_id"';

    access_log /var/log/nginx/access.log main;

    # --------------------------------------------------------
    # Performance Tuning
    # --------------------------------------------------------
    # Enable sendfile for zero-copy file transfers
    sendfile on;

    # Combine packets before sending (reduces overhead)
    tcp_nopush on;

    # Disable Nagle's algorithm for low-latency responses
    tcp_nodelay on;

    # Keepalive timeout
    keepalive_timeout 65;

    # Hash table size for MIME types
    types_hash_max_size 2048;

    # Maximum upload body size (50MB for audio files)
    client_max_body_size 50M;

    # Buffer sizes
    client_body_buffer_size 16K;
    client_header_buffer_size 1K;
    large_client_header_buffers 4 8K;

    # --------------------------------------------------------
    # Timeouts (prevent slowloris attacks)
    # --------------------------------------------------------
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;

    # --------------------------------------------------------
    # Gzip Compression
    # --------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;
    gzip_disable "MSIE [1-6]\.(?!.*SV1)";

    # --------------------------------------------------------
    # Rate Limiting Zones
    # --------------------------------------------------------
    # API general rate limit: 10 req/sec per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # WebSocket rate limit: 30 req/sec per IP
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=30r/s;

    # Login/auth rate limit: 5 req/min per IP (strict)
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # Connection limit per IP
    limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

    # --------------------------------------------------------
    # Request ID Generation (for distributed tracing)
    # --------------------------------------------------------
    map $http_x_request_id $request_id {
        default $http_x_request_id;
        ""      $request_id_internal;
    }
    map "" $request_id_internal {
        volatile;
        default $request_id_random;
    }

    # --------------------------------------------------------
    # Upstream Definitions (backend services)
    # --------------------------------------------------------

    # FastAPI backend (keepalive for connection reuse)
    upstream api_backend {
        server api:8000;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # WebSocket backend (long-lived connections)
    upstream websocket_backend {
        server websocket:8001;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 7d;
    }

    # Grafana (monitoring dashboards)
    upstream grafana_backend {
        server grafana:3000;
        keepalive 16;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # MinIO S3 API
    upstream minio_backend {
        server minio:9000;
        keepalive 16;
        keepalive_requests 1000;
        keepalive_timeout 300s;
    }

    # MinIO Web Console
    upstream minio_console_backend {
        server minio:9001;
        keepalive 16;
        keepalive_requests 1000;
        keepalive_timeout 300s;
    }

    # Prometheus
    upstream prometheus_backend {
        server prometheus:9090;
        keepalive 8;
        keepalive_timeout 60s;
    }

    # Alertmanager
    upstream alertmanager_backend {
        server alertmanager:9093;
        keepalive 8;
        keepalive_timeout 60s;
    }

    # Loki
    upstream loki_backend {
        server loki:3100;
        keepalive 8;
        keepalive_timeout 60s;
    }

    # --------------------------------------------------------
    # Security Headers (applied globally)
    # --------------------------------------------------------
    # These are also set per-server for defense in depth
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # --------------------------------------------------------
    # SSL Configuration (shared SSL settings)
    # --------------------------------------------------------
    # Mozilla Intermediate configuration (2024)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # --------------------------------------------------------
    # File Cache (static assets)
    # --------------------------------------------------------
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # --------------------------------------------------------
    # Include Server Blocks
    # --------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}

