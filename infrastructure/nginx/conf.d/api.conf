# ============================================================
# API Server Block — SSL + Rate Limiting + Reverse Proxy
# ============================================================
# File: infrastructure/nginx/conf.d/api.conf
# Routes: /api/*, /ws/*, /health
# Features: Let's Encrypt, rate limiting, WebSocket upgrade
# ============================================================

# ------------------------------------------------------------------
# HTTP → HTTPS Redirect + ACME Challenge
# ------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.${DOMAIN} ${DOMAIN};

    # ACME challenge for Let's Encrypt (must be HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ------------------------------------------------------------------
# HTTPS API Server
# ------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.${DOMAIN} ${DOMAIN};

    # SSL Certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;

    # Security headers (defense in depth)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Request ID for tracing
    add_header X-Request-ID $request_id always;

    # ---- API Endpoints ----
    location /api/ {
        # Rate limiting: 10 req/s burst to 20
        limit_req zone=api_limit burst=20 nodelay;
        # Connection limit: 50 per IP
        limit_conn addr_limit 50;

        # Proxy to FastAPI backend
        proxy_pass http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts for API calls
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Disable buffering for streaming responses
        proxy_buffering off;

        # Proxy cache (optional — for GET endpoints)
        proxy_cache_valid 200 10s;
        proxy_cache_use_stale error timeout updating;
    }

    # ---- WebSocket Endpoint ----
    location /ws/ {
        # Higher rate limit for WebSocket
        limit_req zone=ws_limit burst=50 nodelay;

        # Proxy to WebSocket backend
        proxy_pass http://websocket_backend/;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Very long timeouts for persistent WebSocket connections
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # Disable buffering for real-time communication
        proxy_buffering off;
    }

    # ---- Auth Endpoints (stricter rate limiting) ----
    location /api/v1/auth/ {
        # Strict rate limit for auth: 5 req/min
        limit_req zone=login_limit burst=5 nodelay;
        limit_conn addr_limit 10;

        proxy_pass http://api_backend/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    # ---- Health Check (no rate limiting, no auth) ----
    location /health {
        access_log off;
        return 200 '{"status":"healthy","service":"nginx"}\n';
        add_header Content-Type application/json;
    }

    # ---- Prometheus Metrics (internal only) ----
    location /metrics {
        # Only allow internal network access
        allow 172.20.0.0/16;
        allow 172.21.0.0/16;
        allow 127.0.0.1;
        deny all;

        access_log off;
        return 200 '{"status":"ok"}\n';
        add_header Content-Type application/json;
    }
}
