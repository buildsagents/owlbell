# ============================================================
# FreeSWITCH SIP/RTP Proxy Configuration
# ============================================================
# File: infrastructure/nginx/conf.d/freeswitch.conf
# Purpose: SIP signaling proxy (if nginx handles SIP)
# Note: FreeSWITCH handles SIP directly in most deployments
# ============================================================

# SIP UDP proxy via stream module (in nginx.conf)
# This file is reserved for future HTTP-based SIP handling

# WebRTC signaling endpoint (WSS → WS proxy)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sip.${DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # WebSocket proxy for SIP over WebSockets (WebRTC)
    location /ws {
        proxy_pass http://freeswitch:5066;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        proxy_buffering off;
    }
}
