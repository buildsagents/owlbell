# Alembic configuration
# Location: backend/db/migrations/alembic.ini

[alembic]
script_location = backend/db/migrations
prepend_sys_path = .
version_path_separator = os
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Database URL (overridden by env.py from environment)
sqlalchemy.url = postgresql+asyncpg://localhost/answerflow

[post_write_hooks]
# Auto-format migrations with ruff
hooks = ruff
ruff.type = exec
ruff.executable = %(here)s/../../../../.venv/bin/ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
